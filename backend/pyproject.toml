[project]
name = "it-asset-backend"
version = "0.1.0"
description = "IT asset & inventory management — backend (FastAPI)"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "alembic>=1.13",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "redis>=5.2",
    "celery>=5.4",
    "httpx>=0.27",
    "anyio>=4.4",
    "openpyxl>=3.1",
    "python-multipart>=0.0.12",
    "lark-oapi>=1.4",
    "python-jose[cryptography]>=3.3",
    "structlog>=24.4",
    "segno>=1.6",
    "minio>=7.2",
    "pypinyin>=0.53",
    "bcrypt>=4.1",
    "fpdf2>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["app", "tests"]
# Alembic migration files are autogenerated — don't lint their formatting.
extend-exclude = ["app/alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI's `Depends()` in argument defaults is the intended pattern.
ignore = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]
