server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Match attachment upload limit (router caps at 10MB; give headroom).
    client_max_body_size 16M;

    # Close idle keep-alive connections quickly so a LAN firewall / switch /
    # NAT can't silently drop the TCP flow first and leave the browser holding
    # a half-dead socket — reusing that socket on the next refresh returns no
    # bytes (ERR_EMPTY_RESPONSE / -324) until the user reopens the app. A short
    # timeout means nginx's FIN reaches the browser while the path is still
    # alive, so it always reconnects fresh after idle. Default is 75s — well
    # above many middlebox idle timeouts; 30s sits safely under them.
    keepalive_timeout 30s;
    # Detect dead peers on long-lived (e.g. download) connections too.
    keepalive_requests 1000;

    # /api/* → backend container; preserve method, headers, body.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_request_buffering off;
    }

    # SPA: any unknown path falls back to index.html (client router resolves).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
