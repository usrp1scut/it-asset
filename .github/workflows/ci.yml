name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The compose backend reads env_file: .env (gitignored); the example
      # ships APP_DEBUG=true + db/redis/minio hosts, which is exactly what the
      # tests need. Run ruff + pytest inside compose so the runtime matches
      # local (host=db/redis/minio resolve on the compose network).
      - name: Prepare .env
        run: cp .env.example .env
      - name: Start data services
        run: docker compose up -d --wait db redis minio
      - name: Migrate (fresh schema)
        run: docker compose run --rm backend alembic upgrade head
      - name: Ruff
        run: docker compose run --rm backend ruff check .
      - name: Pytest
        run: docker compose run --rm backend pytest -q
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail 100 db redis minio

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
